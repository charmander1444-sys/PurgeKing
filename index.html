<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurgeKing | Redes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <!-- 🔴 NAVBAR -->
    <nav class="navbar navbar-dark bg-black px-4 fixed-top sombra-nav">
        <span class="navbar-brand fw-bold fs-4">PurgeKing</span>
    </nav>

    <!-- 🔥 BANNER -->
    <section class="banner">
        <div class="overlay d-flex justify-content-center align-items-center">
            <div class="text-center text-white">
                <h1 class="fw-bold">Sigue a PurgeKing</h1>
                <p>Contenido de Re:Zero y entretenimiento</p>
            </div>
        </div>
    </section>

    <!-- 🔥 REDES -->
    <section class="container text-center mt-5">
        <h2 class="mb-4">Redes Oficiales</h2>

        <div class="row g-4 justify-content-center">

            <!-- YOUTUBE -->
            <div class="col-md-4">
                <div class="card p-4 sombra-card social-card" data-red="youtube">
                    <i class="bi bi-youtube display-3 text-danger"></i>
                    <h4 class="mt-3 fw-bold fs-3 text-youtube">YOUTUBE</h4>
                    <p class="descripcion">Videos largos y contenido completo</p>

                    <a href="https://www.youtube.com/@Purgeking-t2w" target="_blank" class="btn btn-youtube mt-3">
                        Ir al canal
                    </a>
                </div>
            </div>

            <!-- TIKTOK -->
            <div class="col-md-4">
                <div class="card p-4 sombra-card social-card" data-red="tiktok">
                    <i class="bi bi-tiktok display-3 text-tiktok"></i>
                    <h4 class="mt-3 fw-bold fs-3 text-tiktok">TIKTOK</h4>
                    <p class="descripcion">Contenido corto y viral</p>

                    <a href="https://www.tiktok.com/@theepurgeking" target="_blank" class="btn btn-tiktok mt-3">
                        Ir al canal
                    </a>
                </div>
            </div>

            <!-- TWITTER -->
            <div class="col-md-4">
                <div class="card p-4 sombra-card social-card" data-red="twitter">
                    <i class="bi bi-twitter-x display-3 text-twitter"></i>
                    <h4 class="mt-3 fw-bold fs-3 text-twitter">TWITTER</h4>
                    <p class="descripcion">Noticias y comunidad</p>

                    <a href="#" class="btn btn-twitter mt-3">
                        Ir al canal
                    </a>
                </div>
            </div>

            <!-- 🔴 MODAL UNIVERSAL -->
            <div class="modal fade" id="socialModal" tabindex="-1">
                <div class="modal-dialog modal-lg modal-dialog-centered">
                    <div class="modal-content bg-dark text-white">

                        <div class="modal-header border-0">
                            <h5 id="modalTitle"></h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="modal-body text-center">

                            <!-- PERFIL -->
                            <img id="modalAvatar" class="rounded-circle mb-3" width="120">
                            <h4 id="modalName"></h4>

                            <!-- VIDEOS -->
                            <div class="row mt-4 g-3" id="modalVideos"></div>

                        </div>

                    </div>
                </div>
            </div>

            <section class="container mt-5">
                <div class="row g-4 align-items-center">

                    <div class="col-lg-7">
                        <h2 class="mb-4 text-center text-lg-start">El discord</h2>
                        <div class="ratio ratio-16x9 shadow-lg" style="border-radius: 16px; overflow: hidden;">
                            <iframe src="https://www.youtube.com/embed/-G_anWQRC9g" title="YouTube video player"
                                frameborder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                allowfullscreen>
                            </iframe>
                        </div>
                    </div>

                    <div class="col-lg-5">
                        <h2 class="mb-4 text-center text-lg-start">Únete al Discord</h2>
                        <iframe src="https://discord.com/widget?id=1449485486942064772&theme=dark" width="100%" height="400"
                            frameborder="0" style="border-radius:16px;">
                        </iframe>
                    </div>

                    

                </div>
            </section>

            <!-- JS -->
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
            <script src="social.js"></script>

</body>

</html>
